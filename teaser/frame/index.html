<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Sous Le Parasol — The Last Frame</title>
<meta name="theme-color" content="#BE7660">
<style>
  /* Tokens from _ds/sous-le-parasol design system. Fonts fall back to the
     system stacks declared there — no network requests on this page. */
  :root{
    --ink:#211913; --ink-deep:#160F0A; --paper:#F6F1E7; --muted:#9D8A6B;
    --accent:#9E4B36; --umber:#6B5238; --shadow:#2E1810;
    --font-display:'Marcellus','Times New Roman',serif;
    --font-mono:'Space Mono',ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    height:100vh;height:100dvh;width:100%;overflow:hidden;
    background:#8B4A38;
    touch-action:none;overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;
    -webkit-font-smoothing:antialiased;
  }
  body{font-family:var(--font-mono);color:var(--ink);position:fixed;inset:0;}
  canvas#cv{position:fixed;inset:0;width:100%;height:100vh;height:100dvh;display:block;touch-action:none;}

  /* ---- shutter flash ---- */
  .flash{
    position:fixed;inset:0;z-index:40;background:#FFF7EC;pointer-events:none;
    opacity:0;transition:opacity .22s ease;
  }
  .flash.on{opacity:.92;transition:none;}

  /* ---- captured-frame hairline + caption ---- */
  .capframe{
    position:fixed;inset:12px;z-index:30;pointer-events:none;
    border:1px solid rgba(246,241,231,.85);
    opacity:0;transition:opacity .35s ease;
  }
  .capframe.on{opacity:1;}
  .capframe .caption{
    position:absolute;right:10px;bottom:8px;
    font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;color:rgba(246,241,231,.92);
    text-shadow:0 1px 3px rgba(40,15,8,.55);
  }

  /* ---- replay nudge ---- */
  .nudge{
    position:fixed;left:50%;bottom:calc(17% + env(safe-area-inset-bottom));transform:translateX(-50%);
    z-index:20;font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;
    color:rgba(246,241,231,.9);text-shadow:0 1px 3px rgba(40,15,8,.45);
    white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .5s ease;
  }
  .ph-wait .nudge{animation:nudgeIn .8s ease forwards,nudgeBreathe 4s ease-in-out .9s infinite;}
  @keyframes nudgeIn{from{opacity:0}to{opacity:.85}}
  @keyframes nudgeBreathe{0%,100%{opacity:.7}50%{opacity:.92}}

  /* ---- replay button ---- */
  .replaybtn{
    position:fixed;left:50%;bottom:calc(26px + env(safe-area-inset-bottom));transform:translateX(-50%);
    z-index:35;background:none;border:0;cursor:pointer;
    font-family:var(--font-mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;
    color:rgba(246,241,231,.92);text-shadow:0 1px 3px rgba(40,15,8,.5);
    padding:12px 16px 8px;border-bottom:1px solid rgba(246,241,231,.45);
    opacity:0;pointer-events:none;transition:opacity .5s ease .25s;
  }
  body.replay-on .replaybtn{opacity:1;pointer-events:auto;}

  /* ---- end note ---- */
  .endnote{
    position:fixed;left:50%;top:55%;transform:translate(-50%,-50%);z-index:35;
    font-family:var(--font-display);font-size:20px;letter-spacing:.04em;color:var(--ink);
    white-space:nowrap;opacity:0;transition:opacity 1.1s ease .4s;pointer-events:none;
  }
  .ph-end .endnote{opacity:.9;}

  /* ---- invitation ---- */
  .invite{
    position:fixed;left:50%;top:40%;transform:translate(-50%,0);z-index:20;
    width:min(78vw,300px);text-align:center;
    visibility:hidden;transition:transform .3s ease;
  }
  .ph-form .invite,.ph-wait .invite{visibility:visible;}
  .invite .line{
    font-family:var(--font-display);font-size:22px;letter-spacing:.04em;color:var(--ink);
    opacity:0;transition:opacity .6s ease;
  }
  .invite form{
    display:flex;align-items:baseline;gap:8px;margin-top:26px;
    border-bottom:1px solid rgba(33,25,19,.55);padding-bottom:6px;
    opacity:0;transition:opacity .6s ease .3s;
  }
  .invite input{
    flex:1;min-width:0;border:0;outline:none;background:transparent;
    font-family:var(--font-mono);font-size:16px;letter-spacing:.02em;color:var(--ink);
    padding:2px 0;text-align:center;border-radius:0;-webkit-user-select:text;user-select:text;
  }
  .invite input::placeholder{color:rgba(33,25,19,.45);}
  .invite .go{
    background:none;border:0;cursor:pointer;font-family:var(--font-mono);
    font-size:16px;color:var(--ink);padding:0 2px;
  }
  .invite .fine{
    margin-top:14px;font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;
    line-height:1.6;color:rgba(33,25,19,.62);opacity:0;transition:opacity .6s ease .3s;
  }
  .invite .err{
    margin-top:12px;font-family:var(--font-mono);font-size:11px;letter-spacing:.02em;
    color:var(--accent);min-height:14px;opacity:0;transition:opacity .3s ease;
  }
  .invite .err.on{opacity:1;}
  .invite.show .line,.invite.show form,.invite.show .fine{opacity:1;}
  .invite .done{
    position:absolute;left:0;right:0;top:64px;
    font-family:var(--font-display);font-size:18px;letter-spacing:.04em;color:var(--ink);
    opacity:0;transition:opacity .8s ease .3s;pointer-events:none;
  }
  .invite.sent form,.invite.sent .fine,.invite.sent .err{opacity:0;transition:opacity .5s ease;pointer-events:none;}
  .invite.sent .done{opacity:1;}
  .invite.gone{visibility:hidden!important;}

  /* ---- debug panel ---- */
  .dbg{
    position:fixed;top:0;right:0;z-index:99;max-height:100dvh;overflow-y:auto;
    background:rgba(22,15,10,.86);color:#EFE7D7;padding:10px 12px 14px;
    font-family:var(--font-mono);font-size:10px;letter-spacing:.02em;width:210px;
    touch-action:pan-y;-webkit-user-select:none;
  }
  .dbg h2{font-size:10px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;color:#C8AC74;}
  .dbg .row{margin-top:7px;}
  .dbg label{display:flex;justify-content:space-between;}
  .dbg input[type=range]{width:100%;margin-top:2px;}
  .dbg button{
    margin-top:10px;width:100%;background:#C8AC74;color:#211913;border:0;padding:6px;
    font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;cursor:pointer;
  }
  @media(prefers-reduced-motion:reduce){
    .nudge,.invite .line,.invite form,.invite .fine,.endnote,.replaybtn{transition:none!important;animation:none!important;}
    .ph-wait .nudge{opacity:.85;}
    .ph-end .endnote{opacity:.9;}
    body.replay-on .replaybtn{opacity:1;}
    .invite.show .line,.invite.show form,.invite.show .fine{opacity:1;}
  }
</style>
</head>
<body class="ph-seq">
<canvas id="cv"></canvas>
<div class="flash" id="flash"></div>
<div class="capframe" id="capframe"><span class="caption" id="capcaption"></span></div>
<div class="nudge" id="nudge">Replay. Try to catch the moment.</div>
<button class="replaybtn" id="replaybtn" type="button">Replay</button>
<div class="endnote" id="endnote">Nothing left to catch.</div>
<div class="invite" id="invite" aria-hidden="true">
  <div class="line">Disappear into the summer</div>
  <form id="mailform" novalidate>
    <input id="mail" type="email" inputmode="email" autocomplete="email" autocapitalize="off" spellcheck="false" placeholder="your email" aria-label="your email">
    <button type="submit" class="go" aria-label="Send">&#8594;</button>
  </form>
  <div class="err" id="mailerr" role="alert"></div>
  <div class="fine">One letter when the summer opens. Nothing else.</div>
  <div class="done" id="maildone">Summer, found again.</div>
</div>

<script>
(function(){
'use strict';

const SUBSCRIBE_ENDPOINT = ""; // empty = simulate success locally

/* Real photography: drop seven 900×1600 WebP files into teaser/frame/frames/
   and this manifest picks them up. If any file is missing the page falls
   back to procedural placeholders, so it works today with zero images.
   Set to [] to force placeholders. */
const FRAMES = [
  "frames/frame-01.webp",
  "frames/frame-02.webp",
  "frames/frame-03.webp",
  "frames/frame-04.webp",
  "frames/frame-05.webp",
  "frames/frame-06.webp",
  "frames/frame-07.webp",
];

/* ---------------- environment ---------------- */
const qs = new URLSearchParams(location.search);
const DEBUG = qs.get('debug') === '1';
const STAGE = qs.get('stage');
const FORCED = parseInt(qs.get('frames') || '', 10);
const META_BROWSER = /FBAN|FBAV|Instagram/i.test(navigator.userAgent);
const REDUCED = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
if (DEBUG) console.log('[frame] meta in-app browser:', META_BROWSER, '| ua:', navigator.userAgent);

/* ---------------- tunables ---------------- */
const P = {
  h1: 700, h2: 620, h3: 480, h4: 300, h5: 180, h6: 110, h7: 2400, // frame holds, ms
  jitter: 3,     // max registration offset, px (min is always 1 — never zero)
  grain: 0.14,   // runtime grain overlay opacity
  resist: 1.0,   // how strongly a backward drag pulls against the playhead
  spring: 15,    // 1/s — how fast forward play returns after release (~200 ms)
  sunGrow: 0.19  // sun radius growth per frame (procedural placeholders only)
};
const MAX_PULL = 1.25;  // resistance cap: brief backward slip, never a full stop
const HOLD_DAMP = 3.2;  // resistance decay while the finger is still down
const LS_KEY = 'slpFrameTuning';
if (DEBUG) {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    for (const k in saved) if (k in P && isFinite(saved[k])) P[k] = saved[k];
  } catch (e) {}
}
function holdFor(orig){ return P['h' + (orig + 1)]; }

/* ---------------- state ---------------- */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
let frames = [];            // 7 drawables (offscreen canvases or images), original order
let procedural = true;
let alive = [0,1,2,3,4,5,6];// surviving original frame indices
let attempt = 0;            // replay attempts started
let p = 0;                  // playhead, float, in units of surviving frames
let pull = 0;               // drag resistance currently applied
let phase = 'seq';          // seq | form | wait | replay | held | end
let shownCell = -1, jx = 1, jy = 1, gox = 0, goy = 0;
let dirty = true, grainPat = null;
let holdingPtr = null, lastPX = 0, downX = 0, downY = 0, downT = 0, moved = false;
let rafId = 0, lastFrame = 0, fpsN = 0, fpsT = 0, fps = 0, dbgInfo = null;
let reducedSeq = false;

const clamp = (v,a,b)=>v<a?a:v>b?b:v;

if (FORCED >= 1 && FORCED <= 7) {
  if (FORCED === 1) alive = [6];
  else {
    const k = FORCED - 1, pick = [];
    for (let j = 0; j < k; j++) pick.push(Math.round(j * 5 / Math.max(1, k - 1)));
    alive = [...new Set(pick)].sort((a,b)=>a-b); alive.push(6);
  }
  attempt = 7 - alive.length; // frames already lost, so the next replay keeps losing
}

/* ---------------- procedural placeholders ----------------
   A JS port of gen_frames.py: terracotta ground, stick-figure silhouette,
   growing blown-out sun, progressive blur and contrast loss. Grain is
   applied at draw time from one pre-rendered tile (heavier per frame). */
const FW = 900, FH = 1600, FIGY = 0.535;
const POSES = [
  {head:[0.010,-0.380],neck:[0.005,-0.278],shL:[-0.068,-0.258],shR:[0.078,-0.256],
   elL:[-0.140,-0.160],elR:[0.155,-0.170],haL:[-0.120,-0.040],haR:[0.215,-0.070],
   hiL:[-0.050,0.010],hiR:[0.055,0.010],knL:[-0.125,0.215],knR:[0.115,0.220],
   ftL:[-0.060,0.455],ftR:[0.235,0.360]},
  {head:[0.030,-0.378],neck:[0.020,-0.276],shL:[-0.050,-0.258],shR:[0.090,-0.252],
   elL:[-0.165,-0.150],elR:[0.190,-0.150],haL:[-0.230,-0.062],haR:[0.280,-0.030],
   hiL:[-0.045,0.012],hiR:[0.060,0.012],knL:[-0.150,0.210],knR:[0.140,0.225],
   ftL:[-0.105,0.450],ftR:[0.285,0.395]},
  {head:[0.055,-0.372],neck:[0.040,-0.272],shL:[-0.032,-0.256],shR:[0.110,-0.246],
   elL:[-0.190,-0.190],elR:[0.230,-0.110],haL:[-0.330,-0.140],haR:[0.330,0.035],
   hiL:[-0.038,0.014],hiR:[0.068,0.014],knL:[-0.175,0.200],knR:[0.175,0.215],
   ftL:[-0.160,0.435],ftR:[0.340,0.330]},
  {head:[0.080,-0.362],neck:[0.062,-0.264],shL:[-0.010,-0.252],shR:[0.132,-0.236],
   elL:[-0.215,-0.230],elR:[0.262,-0.070],haL:[-0.395,-0.235],haR:[0.375,0.115],
   hiL:[-0.028,0.016],hiR:[0.078,0.016],knL:[-0.200,0.190],knR:[0.205,0.200],
   ftL:[-0.230,0.410],ftR:[0.395,0.285]},
  {head:[0.115,-0.345],neck:[0.090,-0.250],shL:[0.020,-0.244],shR:[0.160,-0.222],
   elL:[-0.220,-0.270],elR:[0.290,-0.020],haL:[-0.430,-0.330],haR:[0.410,0.180],
   hiL:[-0.012,0.018],hiR:[0.090,0.018],knL:[-0.215,0.175],knR:[0.240,0.180],
   ftL:[-0.290,0.375],ftR:[0.440,0.235]},
  {head:[0.150,-0.320],neck:[0.120,-0.232],shL:[0.055,-0.232],shR:[0.190,-0.205],
   elL:[-0.200,-0.300],elR:[0.315,0.030],haL:[-0.440,-0.400],haR:[0.435,0.240],
   hiL:[0.005,0.020],hiR:[0.105,0.020],knL:[-0.220,0.160],knR:[0.270,0.160],
   ftL:[-0.335,0.340],ftR:[0.480,0.190]}
];
const BONES = [
  ['neck','shL',0.040],['neck','shR',0.040],
  ['shL','elL',0.030],['elL','haL',0.023],
  ['shR','elR',0.030],['elR','haR',0.023],
  ['neck','hiL',0.074],['neck','hiR',0.074],
  ['hiL','hiR',0.058],
  ['hiL','knL',0.044],['knL','ftL',0.032],
  ['hiR','knR',0.044],['knR','ftR',0.032]
];
const PP = [
  {pose:0, cx:0.44, fh:0.55, alpha:1.00, blur:1.2,  motion:0,  sun:1.00, glow:0.00, gblur:0.6, fade:0.00},
  {pose:1, cx:0.46, fh:0.55, alpha:0.99, blur:1.8,  motion:2,  sun:1.14, glow:0.05, gblur:0.9, fade:0.02},
  {pose:2, cx:0.49, fh:0.55, alpha:0.96, blur:3.0,  motion:5,  sun:1.30, glow:0.12, gblur:1.4, fade:0.05},
  {pose:3, cx:0.53, fh:0.54, alpha:0.88, blur:5.5,  motion:11, sun:1.50, glow:0.22, gblur:2.2, fade:0.11},
  {pose:4, cx:0.58, fh:0.53, alpha:0.72, blur:9.0,  motion:20, sun:1.74, glow:0.36, gblur:3.4, fade:0.20},
  {pose:5, cx:0.65, fh:0.52, alpha:0.44, blur:15.0, motion:34, sun:2.02, glow:0.52, gblur:5.0, fade:0.32},
  {pose:-1,cx:0.70, fh:0.51, alpha:0.00, blur:0,    motion:0,  sun:2.26, glow:0.64, gblur:6.2, fade:0.42}
];

function mkCanvas(w,h){ const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }

// cheap gaussian stand-in: downscale then upscale (works everywhere, no ctx.filter)
function blurred(src, r){
  if (r < 0.5) return src;
  const f = clamp(r * 0.85, 1.4, 14);
  const tw = Math.max(6, Math.round(FW / f)), th = Math.max(6, Math.round(FH / f));
  const t = mkCanvas(tw, th), tc = t.getContext('2d');
  tc.imageSmoothingEnabled = true;
  tc.drawImage(src, 0, 0, tw, th);
  const o = mkCanvas(FW, FH), oc = o.getContext('2d');
  oc.imageSmoothingEnabled = true;
  oc.drawImage(t, 0, 0, FW, FH);
  return o;
}
function rad(g, x, y, r, stops){
  const gr = g.createRadialGradient(x, y, 0, x, y, r);
  for (const s of stops) gr.addColorStop(s[0], s[1]);
  g.fillStyle = gr;
  g.fillRect(x - r, y - r, r * 2, r * 2);
}
function figureLayer(f){
  if (f.pose < 0) return null;
  const c = mkCanvas(FW, FH), g = c.getContext('2d');
  const pose = POSES[f.pose], fh = f.fh * FH, cx = f.cx * FW, cy = FIGY * FH;
  g.strokeStyle = g.fillStyle = '#2E1810';
  g.lineCap = 'round'; g.lineJoin = 'round';
  const pt = k => [cx + pose[k][0] * fh, cy + pose[k][1] * fh];
  for (const bone of BONES){
    const pa = pt(bone[0]), pb = pt(bone[1]);
    g.lineWidth = Math.max(2, bone[2] * fh);
    g.beginPath(); g.moveTo(pa[0], pa[1]); g.lineTo(pb[0], pb[1]); g.stroke();
  }
  const hp = pt('head'), hr = 0.070 * fh;
  g.beginPath(); g.ellipse(hp[0], hp[1], hr * 0.86, hr, 0, 0, Math.PI * 2); g.fill();
  let out = blurred(c, f.blur);
  if (f.motion > 0){ // horizontal smear — the figure moving faster than the shutter
    const s = mkCanvas(FW, FH), sg = s.getContext('2d');
    const steps = 7;
    sg.globalAlpha = 1 / steps;
    for (let k = 0; k < steps; k++)
      sg.drawImage(out, (k - (steps - 1) / 2) * f.motion * 1.15, 0);
    out = s;
  }
  return out;
}
function buildProcFrame(i){
  const f = PP[i];
  let c = mkCanvas(FW, FH), g = c.getContext('2d');
  const lg = g.createLinearGradient(0, 0, 0, FH);
  lg.addColorStop(0, '#CE8E76'); lg.addColorStop(0.42, '#BE7660'); lg.addColorStop(1, '#944A38');
  g.fillStyle = lg; g.fillRect(0, 0, FW, FH);
  const eg = g.createLinearGradient(0, 0, FW, 0);
  eg.addColorStop(0, 'rgba(40,15,8,.10)'); eg.addColorStop(.5, 'rgba(40,15,8,0)'); eg.addColorStop(1, 'rgba(40,15,8,.10)');
  g.fillStyle = eg; g.fillRect(0, 0, FW, FH);

  const fig = figureLayer(f);
  if (fig){ g.globalAlpha = f.alpha; g.drawImage(fig, 0, 0); g.globalAlpha = 1; }

  const R = 0.046 * FW * (1 + P.sunGrow * i);
  const sx = 0.615 * FW, sy = 0.300 * FH;
  g.save();
  g.globalCompositeOperation = 'lighter';
  const A = Math.min(1, f.sun * 0.9), HA = Math.min(1, 0.5 * f.sun);
  rad(g, sx, sy, R * 1.1, [[0,'rgba(255,246,232,'+A+')'],[0.55,'rgba(255,244,228,'+(A*0.8)+')'],[1,'rgba(255,242,224,0)']]);
  rad(g, sx, sy, R * 3.6, [[0,'rgba(255,240,222,'+HA+')'],[1,'rgba(255,240,222,0)']]);
  g.translate(sx, sy); g.scale(4.6, 0.3); // lens streak along the horizon
  rad(g, 0, 0, R * 1.3, [[0,'rgba(255,242,226,'+Math.min(1, 0.35 * f.sun)+')'],[1,'rgba(255,242,226,0)']]);
  g.restore();

  if (f.glow > 0){ // exposure bloom eating the whole image
    const b = blurred(c, 16);
    g.globalAlpha = f.glow; g.drawImage(b, 0, 0); g.globalAlpha = 1;
  }
  if (f.fade > 0){ // contrast loss
    g.fillStyle = 'rgba(196,150,132,' + f.fade + ')'; g.fillRect(0, 0, FW, FH);
    g.fillStyle = 'rgba(255,255,255,' + (f.fade * 0.45) + ')'; g.fillRect(0, 0, FW, FH);
  }
  const vg = g.createRadialGradient(FW/2, FH/2, Math.min(FW,FH)*0.35, FW/2, FH/2, Math.hypot(FW,FH)*0.62);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(30,10,5,.30)');
  g.fillStyle = vg; g.fillRect(0, 0, FW, FH);

  if (f.gblur > 0.7) c = blurred(c, f.gblur);
  return c;
}
function buildProcedural(){
  procedural = true;
  frames = [];
  for (let i = 0; i < 7; i++) frames.push(buildProcFrame(i));
  dirty = true;
}
function loadImages(){
  if (!FRAMES.length) return Promise.resolve(false);
  return Promise.all(FRAMES.map(src => new Promise(res => {
    const im = new Image();
    im.onload = ()=>res(im);
    im.onerror = ()=>res(null);
    im.src = src;
  }))).then(list => {
    if (list.length === 7 && list.every(Boolean)){ frames = list; procedural = false; return true; }
    return false;
  });
}
function buildGrain(){
  const g = document.createElement('canvas'); g.width = 192; g.height = 192;
  const gc = g.getContext('2d'); const id = gc.createImageData(192, 192);
  for (let i = 0; i < id.data.length; i += 4){
    const v = (Math.random() * 255) | 0;
    id.data[i] = v; id.data[i+1] = v; id.data[i+2] = v; id.data[i+3] = 255;
  }
  gc.putImageData(id, 0, 0);
  grainPat = ctx.createPattern(g, 'repeat');
}

/* ---------------- draw ---------------- */
function newJitter(){
  const mag = ()=>1 + Math.random() * Math.max(0, P.jitter - 1); // 1..jitter px, never zero
  jx = (Math.random() < .5 ? -1 : 1) * mag();
  jy = (Math.random() < .5 ? -1 : 1) * mag();
  gox = (Math.random() * 192) | 0; goy = (Math.random() * 192) | 0;
}
function curOrig(){ return alive[clamp(Math.floor(p), 0, alive.length - 1)]; }
function draw(){
  const fr = frames[curOrig()];
  if (!fr) return;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
  ctx.fillStyle = '#8B4A38'; ctx.fillRect(0, 0, W, H);
  const fw = fr.width, fh = fr.height;
  const s = Math.max(W / fw, H / fh);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(fr, (W - fw * s) / 2 + jx, (H - fh * s) / 2 + jy, fw * s, fh * s);
  if (P.grain > 0 && grainPat){
    // real frames carry baked grain — the runtime layer only adds a light
    // shimmer there (its offset changes per frame, like real film stock)
    ctx.globalCompositeOperation = 'overlay';
    ctx.globalAlpha = Math.min(.6, P.grain * (procedural ? 1 + 0.18 * curOrig() : 0.3));
    ctx.save(); ctx.translate(gox, goy);
    ctx.fillStyle = grainPat; ctx.fillRect(-300, -300, W + 600, H + 600);
    ctx.restore();
    ctx.globalCompositeOperation = 'source-over'; ctx.globalAlpha = 1;
  }
}
function resize(){
  W = window.innerWidth; H = window.innerHeight;
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  dirty = true;
}

/* ---------------- phases ---------------- */
const invite = document.getElementById('invite');
const mailform = document.getElementById('mailform');
const mailInput = document.getElementById('mail');
const mailErr = document.getElementById('mailerr');
const nudge = document.getElementById('nudge');
const replaybtn = document.getElementById('replaybtn');
const flash = document.getElementById('flash');
const capframe = document.getElementById('capframe');
const capcaption = document.getElementById('capcaption');

function setPhase(ph){
  phase = ph;
  document.body.classList.remove('ph-seq','ph-form','ph-wait','ph-replay','ph-held','ph-end');
  document.body.classList.add('ph-' + ph);
}
function toForm(){
  setPhase('form');
  invite.setAttribute('aria-hidden', 'false');
  requestAnimationFrame(()=>invite.classList.add('show'));
}
function toWait(){ // "Replay. Try to catch the moment." — tap anywhere begins
  setPhase('wait');
}
function startReplay(){
  if (attempt > 0){ // each replay permanently loses one frame — memory degrading
    const cand = alive.filter(v => v !== 6);
    if (cand.length){
      const r = cand[(Math.random() * cand.length) | 0];
      alive = alive.filter(v => v !== r);
    }
  }
  attempt++;
  invite.classList.add('gone');
  document.body.classList.remove('replay-on');
  capframe.classList.remove('on');
  p = 0; pull = 0; shownCell = -1;
  newJitter();
  setPhase('replay');
  dirty = true;
}
function runEnded(){
  p = alive.length - 0.0001;
  if (phase === 'seq'){
    toForm();
  } else if (phase === 'replay'){
    if (alive.length === 1) setPhase('end');          // only the empty frame remained
    else { setPhase('held'); document.body.classList.add('replay-on'); }
  }
}
function capture(){
  if (phase !== 'replay') return;
  setPhase('held');
  flash.classList.add('on');
  setTimeout(()=>flash.classList.remove('on'), 80);
  capcaption.textContent = 'frame ' + (curOrig() + 1) + ' of 7';
  capframe.classList.add('on');
  if (alive.length > 1) document.body.classList.add('replay-on');
  else setPhase('end'); // caught the empty frame on the last run — nothing left
  try { if (navigator.vibrate) navigator.vibrate(12); } catch (e) {}
}
replaybtn.addEventListener('click', ()=>{ if (phase === 'held') startReplay(); });

/* ---------------- pointer input ----------------
   Phase 1: taps are ignored. Replay: drag back = resistance, tap = shutter. */
function onDown(x, y, id){
  downX = x; downY = y; downT = performance.now(); moved = false;
  if (phase === 'replay'){ holdingPtr = id; lastPX = x; }
}
function onMove(x, y, id){
  if (Math.hypot(x - downX, y - downY) > 10) moved = true;
  if (phase !== 'replay' || holdingPtr !== id) return;
  const dx = x - lastPX; lastPX = x;
  if (dx < 0) pull = Math.min(MAX_PULL, pull + (-dx) * 0.0045 * P.resist);
}
function onUp(id){
  const tap = !moved && performance.now() - downT < 350;
  if (holdingPtr === id) holdingPtr = null;
  if (tap){
    if (phase === 'replay') capture();
    else if (phase === 'wait') startReplay();
  }
}
if (window.PointerEvent){
  cv.addEventListener('pointerdown', e => {
    e.preventDefault();
    try { cv.setPointerCapture(e.pointerId); } catch (err) {}
    onDown(e.clientX, e.clientY, e.pointerId);
  });
  cv.addEventListener('pointermove', e => onMove(e.clientX, e.clientY, e.pointerId));
  cv.addEventListener('pointerup', e => onUp(e.pointerId));
  cv.addEventListener('pointercancel', e => onUp(e.pointerId));
} else {
  cv.addEventListener('touchstart', e => { e.preventDefault(); const t = e.changedTouches[0]; onDown(t.clientX, t.clientY, t.identifier); }, {passive:false});
  cv.addEventListener('touchmove', e => { e.preventDefault(); const t = e.changedTouches[0]; onMove(t.clientX, t.clientY, t.identifier); }, {passive:false});
  cv.addEventListener('touchend', e => { const t = e.changedTouches[0]; onUp(t ? t.identifier : null); });
  cv.addEventListener('touchcancel', e => { const t = e.changedTouches[0]; onUp(t ? t.identifier : null); });
  cv.addEventListener('mousedown', e => onDown(e.clientX, e.clientY, 'm'));
  cv.addEventListener('mousemove', e => onMove(e.clientX, e.clientY, 'm'));
  cv.addEventListener('mouseup', ()=>onUp('m'));
}
document.addEventListener('touchmove', e => { if (e.target === cv) e.preventDefault(); }, {passive:false});
document.addEventListener('gesturestart', e => e.preventDefault());

/* ---------------- main loop ----------------
   The playhead is a float in units of surviving frames. It always advances
   at the accelerating cadence (1 / current frame's hold). Backward drags
   feed `pull`; the effective speed is (1 - pull), capped so forward motion
   can only briefly reverse, and pull decays — slowly while the finger is
   down, fast (the spring) once it lifts. */
function tick(now){
  rafId = requestAnimationFrame(tick);
  const dt = Math.min(0.05, (now - lastFrame) / 1000) || 0.016;
  lastFrame = now;
  fpsN++;
  if (now - fpsT > 500){ fps = Math.round(fpsN * 1000 / (now - fpsT)); fpsN = 0; fpsT = now; }

  if ((phase === 'seq' && !reducedSeq) || phase === 'replay'){
    const len = alive.length;
    const hold = holdFor(curOrig());
    p += dt * 1000 / hold * (1 - pull);
    if (p < 0) p = 0;
    pull *= Math.exp(-dt * (holdingPtr !== null ? HOLD_DAMP : P.spring));
    if (pull < 0.001) pull = 0;
    if (p >= len){
      runEnded();
    } else {
      const cell = Math.floor(p);
      if (cell !== shownCell){ shownCell = cell; newJitter(); dirty = true; }
    }
  }
  if (dirty){ draw(); dirty = false; }
  if (dbgInfo && now - fpsT < 40)
    dbgInfo.textContent = fps + ' fps · p ' + p.toFixed(2) + ' · ' + alive.length + ' left · ' + (procedural ? 'proc' : 'img');
}

/* ---------------- form ---------------- */
let submitting = false;
mailform.addEventListener('submit', e => {
  e.preventDefault();
  if (submitting) return;
  const email = mailInput.value.trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)){
    mailErr.textContent = 'The address needs a name, an @, and a domain.';
    mailErr.classList.add('on');
    return;
  }
  mailErr.classList.remove('on');
  submitting = true;
  const succeed = ()=>{
    invite.classList.add('sent');
    mailInput.blur();
    setTimeout(()=>{ if (phase === 'form') toWait(); }, 800);
  };
  const fail = ()=>{
    submitting = false;
    mailErr.textContent = 'It didn’t go through. Try once more.';
    mailErr.classList.add('on');
  };
  if (!SUBSCRIBE_ENDPOINT){
    console.log('[frame] subscribe (simulated):', email);
    setTimeout(succeed, 600);
  } else {
    fetch(SUBSCRIBE_ENDPOINT, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: email, source: 'last-frame', ts: Date.now()})
    }).then(r => { if (r.ok) succeed(); else fail(); }).catch(fail);
  }
});
/* keyboard: keep the field visible via visualViewport, not fixed positioning */
function onVV(){
  if (phase !== 'form') return;
  const vv = window.visualViewport;
  if (!vv) return;
  invite.style.transform = 'translate(-50%,0)';
  const r = invite.getBoundingClientRect();
  const over = r.bottom + 14 - (vv.offsetTop + vv.height);
  if (over > 0) invite.style.transform = 'translate(-50%,' + (-over) + 'px)';
  window.scrollTo(0, 0);
}
if (window.visualViewport){
  visualViewport.addEventListener('resize', onVV);
  visualViewport.addEventListener('scroll', onVV);
}
mailInput.addEventListener('blur', ()=>{ invite.style.transform = 'translate(-50%,0)'; window.scrollTo(0, 0); });

/* ---------------- lifecycle ---------------- */
let rzT = 0;
window.addEventListener('resize', ()=>{
  if (document.activeElement === mailInput) return; // keyboard resize, not a rotate
  clearTimeout(rzT);
  rzT = setTimeout(resize, 160);
});
window.addEventListener('orientationchange', ()=>{
  clearTimeout(rzT);
  rzT = setTimeout(resize, 220);
});
document.addEventListener('visibilitychange', ()=>{
  if (document.hidden){
    cancelAnimationFrame(rafId); rafId = 0;
  } else if (!rafId){
    lastFrame = performance.now();
    rafId = requestAnimationFrame(tick);
  }
});

/* ---------------- debug panel ---------------- */
let rebuildT = 0;
function buildDebug(){
  const el = document.createElement('div');
  el.className = 'dbg';
  el.innerHTML = '<h2>Frame tuning</h2><div id="dbgInfo">—</div><div id="dbgUa"></div>';
  const DEFS = [
    ['h1','frame 1 hold ms',100,1500,10],
    ['h2','frame 2 hold ms',100,1500,10],
    ['h3','frame 3 hold ms',100,1500,10],
    ['h4','frame 4 hold ms',60,1200,10],
    ['h5','frame 5 hold ms',60,1200,10],
    ['h6','frame 6 hold ms',40,1000,10],
    ['h7','empty hold ms',600,4000,50],
    ['jitter','jitter px',1,6,0.5],
    ['grain','grain opacity',0,0.5,0.01],
    ['resist','drag resistance',0,3,0.05],
    ['spring','spring 1/s',4,40,1],
    ['sunGrow','sun growth',0,0.5,0.01]
  ];
  DEFS.forEach(def => {
    const key = def[0], label = def[1], min = def[2], max = def[3], step = def[4];
    const row = document.createElement('div'); row.className = 'row';
    const lab = document.createElement('label');
    const name = document.createElement('span'); name.textContent = label;
    const val = document.createElement('span'); val.textContent = P[key];
    lab.appendChild(name); lab.appendChild(val);
    const inp = document.createElement('input');
    inp.type = 'range'; inp.min = min; inp.max = max; inp.step = step; inp.value = P[key];
    inp.addEventListener('input', ()=>{
      P[key] = +inp.value; val.textContent = inp.value;
      try { localStorage.setItem(LS_KEY, JSON.stringify(P)); } catch (e) {}
      if (key === 'sunGrow' && procedural){
        clearTimeout(rebuildT);
        rebuildT = setTimeout(()=>{ buildProcedural(); }, 300);
      }
      dirty = true;
    });
    row.appendChild(lab); row.appendChild(inp);
    el.appendChild(row);
  });
  const btn = document.createElement('button');
  btn.textContent = 'copy current values';
  btn.addEventListener('click', ()=>{
    const txt = JSON.stringify(P, null, 2);
    const done = ()=>{ btn.textContent = 'copied'; setTimeout(()=>btn.textContent = 'copy current values', 1200); };
    if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done, ()=>prompt('Copy:', txt));
    else prompt('Copy:', txt);
  });
  el.appendChild(btn);
  document.body.appendChild(el);
  dbgInfo = el.querySelector('#dbgInfo');
  el.querySelector('#dbgUa').textContent = 'in-app: ' + META_BROWSER;
}

/* ---------------- boot ---------------- */
resize();
buildGrain();
loadImages().then(ok => {
  if (!ok) buildProcedural();
  if (DEBUG) console.log('[frame] mode:', ok ? 'images' : 'procedural placeholders');
  newJitter();

  if (STAGE === 'form'){
    p = alive.length - 0.0001; shownCell = alive.length - 1;
    dirty = true;
    toForm();
  } else if (STAGE === 'replay'){
    p = alive.length - 0.0001; shownCell = alive.length - 1;
    dirty = true;
    invite.classList.add('gone');
    toWait();
  } else if (REDUCED){
    // no animation: frame 1, then the empty frame, then straight to the form
    reducedSeq = true;
    setPhase('seq');
    p = 0; dirty = true;
    setTimeout(()=>{ p = alive.length - 0.0001; newJitter(); dirty = true; }, 900);
    setTimeout(()=>{ toForm(); }, 1800);
  } else {
    setPhase('seq');
  }

  lastFrame = performance.now();
  rafId = requestAnimationFrame(tick);
  if (DEBUG) buildDebug();
});

})();
</script>
</body>
</html>
